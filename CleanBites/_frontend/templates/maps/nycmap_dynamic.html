<!DOCTYPE html>
<html lang="en">
<head>
    {% load static %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NYC Restaurant Map</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"/>
    <link rel="stylesheet" href="{% static 'landing/css/styles.css' %}">
    <link rel="stylesheet" href="{% static 'home/map.css' %}">
    <meta name="csrf-token" content="{{ csrf_token }}">
    <meta name="csrf-token" content="{{ csrf_token }}">
</head>
<body>
<div id="map" style="position: relative; top: 0; left: 0; height: 100%; width: 100%; padding-top: 300px;"></div>
<div id="map" style="position: relative; top: 0; left: 0; height: 100%; width: 100%; padding-top: 300px;"></div>

<div id="side-modal" class="side-modal hidden">
    <div class="modal-header">
<div id="side-modal" class="side-modal hidden">
    <div class="modal-header">
        <h2 id="modal-title">Restaurant Name</h2>
        <button class="bookmark-btn" onclick="addBookmark()">★ Bookmark</button>
        <button class="bookmark-btn" onclick="addBookmark()">★ Bookmark</button>
        <button onclick="closeModal()">×</button>
    </div>
    <div id="modal-content"></div>
</div>
    </div>
    <div id="modal-content"></div>
</div>

<script>
    const map = L.map('map').setView([40.7128, -74.0060], 12);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    window.markersLayer = L.layerGroup().addTo(map);

    function getDiningIcon(color) {
        return L.divIcon({
            className: "custom-dining-marker",
            html: `<div class="marker-icon" style="background-color: ${color};"><i class="fa-solid fa-utensils"></i></div>`,
            iconSize: [30, 30],
            iconAnchor: [15, 30],
            popupAnchor: [0, -30]
        });
    }

    function closeModal() {
        document.getElementById("side-modal").classList.remove("show");
    }

    let currentRestaurantId = null;

    function showModal(feature) {
        currentRestaurantId = feature.properties.id;
        const name = feature.properties.name || "Unnamed Restaurant";
        const cuisine = feature.properties.cuisine || "N/A";
        const address = feature.properties.street || "N/A";
        const rating = feature.properties.hygiene_rating || "N/A";

        const modal = document.getElementById("side-modal");
        document.getElementById("modal-title").innerHTML = `
            ${name}
            <div style="font-size: 0.5em; margin-top: 4px;">
                <a href="/restaurant/${currentRestaurantId}/" style="color: #1a73e8; text-decoration: none;">View Profile →</a>
            </div>`;
        document.getElementById("modal-content").innerHTML = `
            <p><strong>Cuisine:</strong> ${cuisine}</p>
            <p><strong>Address:</strong> ${address}</p>
            <p><strong>Hygiene Rating:</strong> ${getLetterGrade(rating, true)}</p>`;
        modal.classList.add("show");
    }

    async function addBookmark() {
        if (!currentRestaurantId) return;
        const csrfToken = document.querySelector('meta[name="csrf-token"]')?.content;
        if (!csrfToken) return;

        const formData = new FormData();
        formData.append('restaurant_id', currentRestaurantId);
        formData.append('csrfmiddlewaretoken', csrfToken);

        const res = await fetch('/bookmarks/', {
            method: 'POST',
            headers: { 'X-CSRFToken': csrfToken, 'X-Requested-With': 'XMLHttpRequest' },
            body: formData,
            credentials: 'include'
        });

        const result = await res.json();
        alert(result.success ? 'Bookmark added!' : (result.error || 'Failed to bookmark'));
    }

    function getColorByRating(rating) {
        if (rating >= 28) return "#ff0000";
        else if (rating >= 14) return "#ffa500";
        else return "#00cc00";
    }

    function getLetterGrade(rating, style = false) {
        let grade = rating <= 13 ? 'A' : (rating <= 27 ? 'B' : 'C');
        let color = rating <= 13 ? '#00cc00' : (rating <= 27 ? '#ffa500' : '#ff0000');
        return style ? `<span style="color:${color};font-weight:bold;">${grade}</span>` : grade;
    }

    window.updateMarkers = function (data) {
        window.markersLayer.clearLayers();
        if (!data.features) return;
        L.geoJSON(data, {
            onEachFeature: function (feature, layer) {
                layer.on('click', () => showModal(feature));
                const name = feature.properties.name || 'UNKNOWN';
                layer.bindTooltip(name, { direction: 'top', offset: L.point(0, -25) });
            },
            pointToLayer: function (feature, latlng) {
                const rating = feature.properties.hygiene_rating || 0;
                const color = getColorByRating(rating);
                return L.marker(latlng, { icon: getDiningIcon(color) });
            }
        }).addTo(window.markersLayer);
    };

    function updateMapData() {
        fetch('/api/restaurants/geojson/')
            .then(r => r.json())
            .then(updateMarkers)
            .catch(console.error);
    }

    window.resetFilters = function () {
        fetch('/api/restaurants/geojson/')
            .then(r => r.json())
            .then(data => {
                updateMarkers(data);
                if (window.parent?.onMapResetComplete) window.parent.onMapResetComplete();
            });
    };

    updateMapData();

    // 🔵 Handle dynamic user location pin (initial + updated)
    let customMarker = null;
    let customCircle = null;

    window.setCustomLocation = function(lat, lng) {
        const latlng = L.latLng(lat, lng);
        map.setView(latlng, 13);
        if (customMarker) map.removeLayer(customMarker);
        if (customCircle) map.removeLayer(customCircle);
        customMarker = L.marker(latlng, {
            icon: L.divIcon({
                className: 'custom-dining-marker',
                html: `<div class="marker-icon" style="background-color: #007bff;"><i class="fa-solid fa-location-dot"></i></div>`,
                iconSize: [30, 30],
                iconAnchor: [15, 30]
            })
        }).addTo(map);
        customCircle = L.circle(latlng, {
            radius: 1000,
            color: '#007bff',
            fillColor: '#cce5ff',
            fillOpacity: 0.4
        }).addTo(map);
    };

    // 🔵 On initial load, try setting to user's location
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
            position => {
                const { latitude, longitude } = position.coords;
                window.setCustomLocation(latitude, longitude);
            },
            () => console.warn("⚠️ Geolocation permission denied or unavailable.")
        );
    }
</script>
</body>
</html>
